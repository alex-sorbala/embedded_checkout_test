<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post - Embedded Checkout Test</title>

  <script src="https://checkout.north.com/checkout.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
    }

    .site-nav {
      display: flex;
      gap: 20px;
      max-width: 600px;
      margin: 0 auto 24px;
      padding: 12px 18px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
    }

    .site-nav a {
      font-size: 14px;
      font-weight: 500;
      color: #0070f3;
      text-decoration: none;
    }

    .site-nav a:hover {
      text-decoration: underline;
    }

    .site-nav a.active {
      color: #111;
      font-weight: 600;
    }

    .controls {
      width: 80%;
      margin: 0 auto 24px;
      display: flex;
      gap: 12px;
    }

    .controls input {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input:focus {
      border-color: #0070f3;
    }

    .controls button {
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #0070f3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .controls button:hover {
      background: #005ecb;
    }

    .controls button:disabled {
      background: #a0c4f8;
      cursor: not-allowed;
    }

    .env-badge {
      width: 80%;
      margin: -14px auto 24px;
      font-size: 12px;
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      color: #666;
    }

    .env-badge strong {
      color: #111;
      font-weight: 600;
    }

    .checkout-form {
      width: 80%;
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #0070f3;
    }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #0070f3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      background: #005ecb;
    }

    .submit-btn:disabled {
      background: #a0c4f8;
      cursor: not-allowed;
    }

    #error-message {
      width: 80%;
      margin: 16px auto 0;
      color: #c00;
      font-size: 14px;
      display: none;
    }

    #response-section {
      width: 80%;
      margin: 32px auto 0;
      display: none;
    }

    #response-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 8px;
    }

    #response-output {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px 20px;
      border-radius: 10px;
      white-space: pre;
      overflow-x: auto;
      margin: 0;
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="form.html">Form</a>
    <a href="fields.html">Fields</a>
    <a href="post.html" class="active">Post</a>
  </nav>

  <div class="controls">
    <input
      type="text"
      id="session-token"
      placeholder="Session Token"
      autocomplete="off"
    />
  </div>

  <p class="env-badge">checkout.js &middot; <strong id="env-domain"></strong></p>

  <p id="error-message"></p>

  <!-- Your custom payment form with all card fields (Direct Post) -->
  <form id="payment-form" class="checkout-form">
    <div class="form-group">
      <label for="card-number">Card Number</label>
      <input type="text" id="card-number" placeholder="4111 1111 1111 1111" maxlength="19" required />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="expiry">Expiration</label>
        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required />
      </div>
      <div class="form-group">
        <label for="cvv">CVV</label>
        <input type="text" id="cvv" placeholder="123" maxlength="4" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" placeholder="John" required />
      </div>
      <div class="form-group">
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" placeholder="Doe" required />
      </div>
    </div>

    <div class="form-group">
      <label for="zip">Billing ZIP Code</label>
      <input type="text" id="zip" placeholder="12345" maxlength="10" required />
    </div>

    <button type="submit" id="submit-btn" class="submit-btn">Pay Now</button>
  </form>

  <div id="response-section">
    <h2>Response</h2>
    <pre id="response-output"></pre>
  </div>

  <script>
    let isSubmitting = false;

    // Handle form submission (Direct Post via checkout.sendPayment)
    async function handleSubmit(event) {
      event.preventDefault();

      if (isSubmitting) return;
      isSubmitting = true;

      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-message');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing...';
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';

      try {
        // Read the session token from the input field
        const sessionToken = document.getElementById('session-token').value.trim();
        if (!sessionToken) {
          throw new Error('Please enter a session token.');
        }

        // Get form values and format for the payment request
        const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
        const expiry = document.getElementById('expiry').value.replace('/', '');  // Convert MM/YY to MMYY
        const cvv = document.getElementById('cvv').value;
        const firstName = document.getElementById('first-name').value;
        const lastName = document.getElementById('last-name').value;
        const zip = document.getElementById('zip').value;

        // Build the payment request object with all required fields
        const payment = {
          account_nbr: cardNumber,      // Card number without spaces
          exp_date: expiry,              // Expiration in MMYY format
          cvv2: cvv,                     // Card security code
          first_name: firstName,         // Cardholder first name
          last_name: lastName,           // Cardholder last name
          zip_code: zip,                 // Billing ZIP for AVS
          payment_method: 'credit',      // Payment type
          batch_id: '123'                // Batch identifier
        };

        // Submit payment using checkout.sendPayment()
        const result = await checkout.sendPayment(sessionToken, payment);

        // Log the raw result to the console
        console.log('Payment response:', result);

        // Display the JSON result in a pretty, raw manner
        const section = document.getElementById('response-section');
        const output = document.getElementById('response-output');
        output.textContent = JSON.stringify(result, null, 2);
        section.style.display = 'block';
      } catch (error) {
        console.error('Payment error:', error);
        errorMsg.textContent = error.message || 'Payment failed. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Pay Now';
      }
    }

    document.getElementById('payment-form').addEventListener('submit', handleSubmit);
  </script>

  <script>
    // Display the checkout.js domain as a visual environment indicator.
    (function () {
      const s = document.querySelector('script[src*="checkout.js"]');
      const el = document.getElementById('env-domain');
      if (s && el) el.textContent = new URL(s.src).hostname;
    })();
  </script>

</body>
</html>
