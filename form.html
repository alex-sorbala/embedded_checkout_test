<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form - Embedded Checkout Test</title>

  <script src="https://checkout.north.com/checkout.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
    }

    .site-nav {
      display: flex;
      gap: 20px;
      max-width: 600px;
      margin: 0 auto 24px;
      padding: 12px 18px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
    }

    .site-nav a {
      font-size: 14px;
      font-weight: 500;
      color: #0070f3;
      text-decoration: none;
    }

    .site-nav a:hover {
      text-decoration: underline;
    }

    .site-nav a.active {
      color: #111;
      font-weight: 600;
    }

    .controls {
      width: 80%;
      margin: 0 auto 24px;
      display: flex;
      gap: 12px;
    }

    .controls input {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input:focus {
      border-color: #0070f3;
    }

    .controls button {
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #0070f3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .controls button:hover {
      background: #005ecb;
    }

    .controls button:disabled {
      background: #a0c4f8;
      cursor: not-allowed;
    }

    .env-badge {
      width: 80%;
      margin: -14px auto 24px;
      font-size: 12px;
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      color: #666;
    }

    .env-badge strong {
      color: #111;
      font-weight: 600;
    }

    #checkout-container {
      width: 80%;
      margin: 0 auto;
      height: 600px;
      min-height: 200px;
      resize: vertical;
      overflow: hidden;
    }

    #checkout-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 16px;
    }

    #error-message {
      width: 80%;
      margin: 0 auto;
      color: #c00;
      font-size: 14px;
      display: none;
    }

    #response-section {
      width: 80%;
      margin: 32px auto 0;
      display: none;
    }

    #response-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 8px;
    }

    #response-output {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px 20px;
      border-radius: 10px;
      white-space: pre;
      overflow-x: auto;
      margin: 0;
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="form.html" class="active">Form</a>
    <a href="fields.html">Fields</a>
    <a href="post.html">Post</a>
  </nav>

  <div class="controls">
    <input
      type="text"
      id="session-token"
      placeholder="Session Token"
      autocomplete="off"
    />
    <button id="render-btn" onclick="mountCheckout()">Render</button>
  </div>

  <p class="env-badge">checkout.js &middot; <strong id="env-domain"></strong></p>

  <p id="error-message"></p>

  <div id="checkout-container"></div>

  <div id="response-section">
    <h2>Response</h2>
    <pre id="response-output"></pre>
  </div>

  <script>
    async function mountCheckout() {
      const token = document.getElementById('session-token').value.trim();
      const container = document.getElementById('checkout-container');
      const errorMsg = document.getElementById('error-message');
      const btn = document.getElementById('render-btn');

      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
      container.innerHTML = '';

      if (!token) {
        errorMsg.textContent = 'Please enter a session token.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;

      try {
        await checkout.mount(token, 'checkout-container');

        checkout.onPaymentComplete((data) => {
          console.log('Payment complete:', data);
          const section = document.getElementById('response-section');
          const output = document.getElementById('response-output');
          output.textContent = JSON.stringify(data, null, 2);
          section.style.display = 'block';
        });
      } catch (error) {
        console.error('Checkout initialization failed:', error);
        errorMsg.textContent = 'Unable to load checkout. Please check your session token and try again.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('session-token').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') mountCheckout();
    });

    // Let the container be resized by dragging its corner (like a textarea).
    // While dragging, drop a transparent shield over the page so the mounted
    // iframe doesn't swallow the mouse events and freeze the resize.
    function enableResizeShield(el) {
      el.addEventListener('mousedown', () => {
        const shield = document.createElement('div');
        shield.style.cssText =
          'position:fixed;inset:0;z-index:9999;cursor:ns-resize;';
        document.body.appendChild(shield);
        const cleanup = () => {
          shield.remove();
          document.removeEventListener('mouseup', cleanup);
        };
        document.addEventListener('mouseup', cleanup);
      });
    }

    enableResizeShield(document.getElementById('checkout-container'));
  </script>

  <script>
    // Display the checkout.js domain as a visual environment indicator.
    (function () {
      const s = document.querySelector('script[src*="checkout.js"]');
      const el = document.getElementById('env-domain');
      if (s && el) el.textContent = new URL(s.src).hostname;
    })();
  </script>

</body>
</html>
