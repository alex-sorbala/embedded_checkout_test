<head>

  <title>Embedded Checkout Test</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 48px 24px;
    }

    .site-nav {
      display: flex;
      gap: 20px;
      max-width: 480px;
      margin: 0 auto 24px;
      padding: 12px 18px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
    }

    .site-nav a {
      font-size: 14px;
      font-weight: 500;
      color: #0070f3;
      text-decoration: none;
    }

    .site-nav a:hover {

    }

    .site-nav a.active {
      color: #111;
      font-weight: 600;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      color: #111;
      margin: 0 0 8px;
    }

    p {
      font-size: 14px;
      color: #666;
      margin: 0 0 32px;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    ul a {
      display: block;
      padding: 16px 20px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      color: #0070f3;
      text-decoration: none;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    ul a:hover {
      border-color: #0070f3;
      box-shadow: 0 2px 8px rgba(0, 112, 243, 0.12);
    }
