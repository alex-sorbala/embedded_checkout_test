<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form - Embedded Checkout Test</title>

  <script src="https://checkout.north.com/checkout.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
    }

    nav {
      max-width: 600px;
      margin: 0 auto 24px;
    }

    nav a {
      font-size: 14px;
      color: #0070f3;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .controls {
      max-width: 600px;
      margin: 0 auto 24px;
      display: flex;
      gap: 12px;
    }

    .controls input {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input:focus {
      border-color: #0070f3;
    }

    .controls button {
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #0070f3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .controls button:hover {
      background: #005ecb;
    }

    .controls button:disabled {
      background: #a0c4f8;
      cursor: not-allowed;
    }

    #checkout-container {
      max-width: 600px;
      margin: 0 auto;
      min-height: 600px;
    }

    #checkout-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 16px;
    }

    #error-message {
      max-width: 600px;
      margin: 0 auto;
      color: #c00;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>

  <nav><a href="index.html">&larr; Back to home</a></nav>

  <div class="controls">
    <input
      type="text"
      id="session-token"
      placeholder="Session Token"
      autocomplete="off"
    />
    <button id="render-btn" onclick="mountCheckout()">Render</button>
  </div>

  <p id="error-message"></p>

  <div id="checkout-container"></div>

  <script>
    async function mountCheckout() {
      const token = document.getElementById('session-token').value.trim();
      const container = document.getElementById('checkout-container');
      const errorMsg = document.getElementById('error-message');
      const btn = document.getElementById('render-btn');

      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
      container.innerHTML = '';

      if (!token) {
        errorMsg.textContent = 'Please enter a session token.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;

      try {
        await checkout.mount(token, 'checkout-container');

        checkout.onPaymentComplete((data) => {
          console.log('Payment complete:', data);
        });
      } catch (error) {
        console.error('Checkout initialization failed:', error);
        errorMsg.textContent = 'Unable to load checkout. Please check your session token and try again.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('session-token').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') mountCheckout();
    });
  </script>

</body>
</html>
