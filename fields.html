<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fields - Embedded Checkout Test</title>

  <script src="https://checkout.north.com/checkout.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
    }

    .site-nav {
      display: flex;
      gap: 20px;
      max-width: 600px;
      margin: 0 auto 24px;
      padding: 12px 18px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
    }

    .site-nav a {
      font-size: 14px;
      font-weight: 500;
      color: #0070f3;
      text-decoration: none;
    }

    .site-nav a:hover {
      text-decoration: underline;
    }

    .site-nav a.active {
      color: #111;
      font-weight: 600;
    }

    .controls {
      width: 80%;
      margin: 0 auto 24px;
      display: flex;
      gap: 12px;
    }

    .controls input {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input:focus {
      border-color: #0070f3;
    }

    .controls button {
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #0070f3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .controls button:hover {
      background: #005ecb;
    }

    .controls button:disabled {
      background: #a0c4f8;
      cursor: not-allowed;
    }

    .checkout-form {
      width: 80%;
      margin: 0 auto;
      height: 500px;
    }

    #payment-fields {
      min-height: 200px;
      margin: 24px 0;
    }

    #payment-fields iframe {
      width: 100%;
      border: none;
      border-radius: 16px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #0070f3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #005ecb;
    }

    .submit-btn:disabled {
      background: #a0c4f8;
      cursor: not-allowed;
    }

    #error-message {
      width: 80%;
      margin: 16px auto 0;
      color: #c00;
      font-size: 14px;
      display: none;
    }

    #response-section {
      width: 80%;
      margin: 32px auto 0;
      display: none;
    }

    #response-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 8px;
    }

    #response-output {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px 20px;
      border-radius: 10px;
      white-space: pre;
      overflow-x: auto;
      margin: 0;
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="form.html">Form</a>
    <a href="fields.html" class="active">Fields</a>
    <a href="post.html">Post</a>
  </nav>

  <div class="controls">
    <input
      type="text"
      id="session-token"
      placeholder="Session Token"
      autocomplete="off"
    />
    <button id="render-btn" onclick="mountFields()">Render</button>
  </div>

  <p id="error-message"></p>

  <form id="payment-form" class="checkout-form">
    <!-- Payment fields will render here -->
    <div id="payment-fields"></div>

    <button type="submit" id="submit-btn" class="submit-btn">Pay</button>
  </form>

  <div id="response-section">
    <h2>Response</h2>
    <pre id="response-output"></pre>
  </div>

  <script>
    let isSubmitting = false;

    // Mount the payment fields using the session token from the input field
    async function mountFields() {
      const token = document.getElementById('session-token').value.trim();
      const container = document.getElementById('payment-fields');
      const errorMsg = document.getElementById('error-message');
      const btn = document.getElementById('render-btn');

      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
      container.innerHTML = '';

      if (!token) {
        errorMsg.textContent = 'Please enter a session token.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;

      try {
        // Mount the secure payment fields inside 'payment-fields'
        await checkout.mount(token, 'payment-fields');
      } catch (error) {
        console.error('Checkout initialization failed:', error);
        errorMsg.textContent = 'Unable to load payment fields. Please check your session token and try again.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }

    // Handle form submission
    async function handleSubmit(event) {
      event.preventDefault();

      if (isSubmitting) return;
      isSubmitting = true;

      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-message');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing...';
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';

      try {
        // Submit the payment using checkout.submit()
        const result = await checkout.submit();

        // Log the raw result to the console
        console.log('Payment response:', result);

        // Display the JSON result in a pretty, raw manner
        const section = document.getElementById('response-section');
        const output = document.getElementById('response-output');
        output.textContent = JSON.stringify(result, null, 2);
        section.style.display = 'block';
      } catch (error) {
        console.error('Payment submission failed:', error);
        errorMsg.textContent = 'An error occurred. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Pay';
      }
    }

    document.getElementById('session-token').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        mountFields();
      }
    });

    document.getElementById('payment-form').addEventListener('submit', handleSubmit);
  </script>

</body>
</html>
